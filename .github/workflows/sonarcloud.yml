name: sonarcloud

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

concurrency:
  group: sonarcloud-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: SonarCloud Scan
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: src
      PAPERBOT_DB_URL: sqlite:///data/paperbot-ci.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarCloud settings
        shell: bash
        env:
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${SONAR_ORGANIZATION}" || { echo "Missing repository variable SONAR_ORGANIZATION"; exit 1; }
          test -n "${SONAR_PROJECT_KEY}" || { echo "Missing repository variable SONAR_PROJECT_KEY"; exit 1; }
          test -n "${SONAR_TOKEN}" || { echo "Missing repository secret SONAR_TOKEN"; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-sonar-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-sonar-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements-ci.txt

      - name: Run backend tests with coverage
        run: bash scripts/ci/run_backend_offline_gates.sh --cov=src --cov-report=xml:coverage.xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run web tests with coverage
        working-directory: web
        run: npm run test:coverage

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-cache
          restore-keys: |
            ${{ runner.os }}-sonar-cache

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

  fork_notice:
    name: Fork PR notice
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
      - name: Record skip reason for fork PR
        shell: bash
        run: |
          set -euo pipefail
          echo "Fork PR detected; SonarCloud scan is skipped because GitHub Actions does not expose repository secrets to workflows from forks."
          {
            echo "### Fork PR SonarCloud scan skipped"
            echo
            echo "This pull request comes from a fork, so GitHub Actions cannot access the repository secrets needed for SonarCloud analysis."
            echo
            echo "Run the scan on a branch inside the main repository if you need PR decoration before merge."
          } >> "${GITHUB_STEP_SUMMARY}"
